name: e2e

on:
  push:
    branches: [main]
  pull_request:

# The suite writes to a real database — the shared dev-testing Neon branch. Two jobs
# running at once would spend each other's per-IP auth budgets and race on the same
# rows, so runs queue rather than overlap. Not cancel-in-progress: a cancelled run
# never reaches its cleanup and leaves an account behind.
concurrency:
  group: e2e-dev-testing
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Auth.js needs to know where it is; the suite drives the dev server on localhost.
      AUTH_URL: http://localhost:3000

      # Neon dev-testing branch. Never production: the suite registers and deletes
      # accounts, and e2e/smoke.spec.ts refuses to run unless DATABASE_URL points at
      # the endpoint named in E2E_EXPECT_DB_HOST.
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      E2E_EXPECT_DB_HOST: ${{ secrets.E2E_EXPECT_DB_HOST }}

      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}

      # Deliberately absent, and each absence is a supported mode rather than an
      # oversight:
      #   RESEND_API_KEY  — unset, so sendEmail() logs the message instead of posting
      #                     it. The suite reads the verification token from the
      #                     database; it needs the token to exist, not the mail to
      #                     arrive, and mailing a made-up address on every push would
      #                     burn real quota on a guaranteed bounce.
      #   UPSTASH_*       — unset, so the auth budgets fall back to the in-memory
      #                     store. Correct here: a CI run should not spend the shared
      #                     Redis budget that the dev laptops are also drawing on.
      #   BLOB_*, GOOGLE_* — unset; nothing in the smoke path uploads a photo or
      #                     talks to Google.

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # npm ci runs the postinstall (prisma generate), but say it out loud: a client
      # that silently failed to generate fails later as a confusing runtime error.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run the smoke test
        run: npm run e2e

      # The report and the trace are the only way to see what a red run actually did.
      - name: Upload the report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
